# =============================================================================
# OpenClaw Guided Install — Docker Compose
# AiGovOps Foundation  |  License: Apache-2.0 WITH Commons-Clause
#
# Quick start:
#   cp .env.example .env          # set OWNER_PASSPHRASE
#   docker compose up -d
#   open http://localhost:5000
#
# Data persistence: SQLite database is stored in ./data/openclaw.db
# =============================================================================

services:
  openclaw-installer:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-installer:latest
    container_name: openclaw-installer

    ports:
      - "5000:5000"

    environment:
      NODE_ENV: production
      PORT: "5000"
      HOST: "0.0.0.0"
      # Set a strong passphrase before first run.
      # You can also put this in a .env file alongside docker-compose.yml.
      OWNER_PASSPHRASE: "${OWNER_PASSPHRASE:-change-me-before-deploy}"

    volumes:
      # SQLite database persistence — data survives container restarts
      - ./data:/data

    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
