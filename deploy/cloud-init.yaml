#cloud-config
# OpenClaw Installer — One-Click VPS Deploy
# Works with any provider that supports cloud-init (Hetzner, Vultr, DigitalOcean, etc.)
# Optimized for Ubuntu 22.04+ with Node.js 20 LTS

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - ufw
  - python3
  - python3-pip
  - nginx
  - certbot
  - python3-certbot-nginx

runcmd:
  # Install Node.js 20 LTS
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs

  # Firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Create app user
  - useradd -m -s /bin/bash openclaw
  - mkdir -p /opt/openclaw
  - chown openclaw:openclaw /opt/openclaw

  # Clone and build
  - su - openclaw -c "git clone https://github.com/bobrapp/openclaw-installer.git /opt/openclaw/app"
  - su - openclaw -c "cd /opt/openclaw/app && npm install && npm run build"
  - su - openclaw -c "cd /opt/openclaw/app && cp public/aigovops-wizard.html dist/public/"
  - su - openclaw -c "cd /opt/openclaw/app && cp -r scripts dist/"

  # Systemd service
  - |
    cat > /etc/systemd/system/openclaw.service << 'EOF'
    [Unit]
    Description=OpenClaw Installer
    After=network.target

    [Service]
    Type=simple
    User=openclaw
    Group=openclaw
    WorkingDirectory=/opt/openclaw/app
    ExecStart=/usr/bin/node dist/index.cjs
    Environment=NODE_ENV=production
    Environment=PORT=5000
    Restart=on-failure
    RestartSec=5
    ProtectSystem=strict
    PrivateTmp=true
    NoNewPrivileges=true
    ReadWritePaths=/opt/openclaw

    [Install]
    WantedBy=multi-user.target
    EOF

  - systemctl daemon-reload
  - systemctl enable --now openclaw

  # Nginx reverse proxy
  - |
    cat > /etc/nginx/sites-available/openclaw << 'NGINX'
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
    NGINX

  - ln -sf /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/openclaw
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t && systemctl reload nginx

final_message: "OpenClaw Installer deployed! Access at http://${public_ipv4}"
