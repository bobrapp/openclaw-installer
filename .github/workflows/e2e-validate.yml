name: E2E Validation — All Host Targets

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      host:
        description: 'Host target to test (or "all")'
        required: false
        default: 'all'
      passphrase:
        description: 'Owner passphrase for authenticated endpoints'
        required: false
        default: ''

concurrency:
  group: e2e-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-validate:
    name: E2E Validate (${{ github.event.inputs.host || 'all' }} hosts)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Default passphrase for CI smoke tests — override via workflow_dispatch or repository secret
      E2E_PASSPHRASE: ${{ github.event.inputs.passphrase || secrets.E2E_OWNER_PASSPHRASE || '' }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Node.js 22 ──────────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Build production bundle ──────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── Copy static assets to dist ───────────────────────────────────────────
      - name: Copy standalone wizard and scripts to dist
        run: |
          cp public/aigovops-wizard.html dist/public/ 2>/dev/null || true
          cp -r scripts dist/ 2>/dev/null || true

      # ── Start server in background ────────────────────────────────────────────
      - name: Start server
        run: |
          NODE_ENV=production node dist/index.cjs &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
        env:
          PORT: 5000

      # ── Set owner passphrase (if provided) ────────────────────────────────────
      - name: Set owner passphrase for CI
        if: env.E2E_PASSPHRASE != ''
        run: |
          # Wait briefly for server to be ready
          sleep 3
          HTTP=$(curl --silent --max-time 5 --write-out '%{http_code}' \
            --output /dev/null \
            http://localhost:5000/api/owner/has-passphrase)
          if [ "$HTTP" = "200" ]; then
            HAS=$(curl --silent --max-time 5 \
              http://localhost:5000/api/owner/has-passphrase | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('hasPassphrase',False))")
            if [ "$HAS" = "False" ]; then
              curl --silent --max-time 10 \
                --request POST \
                --header "Content-Type: application/json" \
                --data "{\"passphrase\":\"${E2E_PASSPHRASE}\"}" \
                http://localhost:5000/api/owner/set-passphrase
              echo "Owner passphrase set."
            else
              echo "Owner passphrase already set, skipping."
            fi
          else
            echo "::warning::Could not reach /api/owner/has-passphrase (HTTP $HTTP)"
          fi

      # ── Wait for server to be ready ────────────────────────────────────────
      - name: Wait for server readiness
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          until curl --silent --fail --max-time 3 http://localhost:5000/health > /dev/null 2>&1; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "::error::Server did not become ready after ${MAX_ATTEMPTS} attempts"
              exit 1
            fi
            echo "Waiting for server... attempt ${ATTEMPT}/${MAX_ATTEMPTS}"
            sleep 1
          done
          echo "Server is ready."

      # ── Make validation script executable ────────────────────────────────────
      - name: Prepare e2e-validate.sh
        run: chmod +x scripts/e2e-validate.sh

      # ── Run E2E validation (all 16 host targets) ──────────────────────────────
      - name: Run E2E validation
        id: e2e
        run: |
          HOST_ARG="${{ github.event.inputs.host || 'all' }}"

          PASSPHRASE_ARGS=()
          if [ -n "${E2E_PASSPHRASE}" ]; then
            PASSPHRASE_ARGS=(--passphrase "${E2E_PASSPHRASE}")
          fi

          set +e
          bash scripts/e2e-validate.sh \
            --host "${HOST_ARG}" \
            --step all \
            --api-url http://localhost:5000 \
            --json-output \
            --verbose \
            "${PASSPHRASE_ARGS[@]}"
          EXIT_CODE=$?
          set -e

          # Locate the generated report
          REPORT=$(ls -t /tmp/e2e-report-*.json 2>/dev/null | head -1 || true)
          if [ -n "$REPORT" ]; then
            cp "$REPORT" /tmp/e2e-report-latest.json
            echo "report_path=/tmp/e2e-report-latest.json" >> "$GITHUB_OUTPUT"
            echo "## E2E Validation Report" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          exit $EXIT_CODE

      # ── Upload JSON report as artifact ────────────────────────────────────────
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-report-${{ github.run_id }}
          path: /tmp/e2e-report-latest.json
          retention-days: 30
          if-no-files-found: warn

      # ── Stop background server ────────────────────────────────────────────────
      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
            echo "Server (PID $SERVER_PID) stopped."
          fi

      # ── Post step summary ─────────────────────────────────────────────────────
      - name: Post summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "**Host targets tested:** ${{ github.event.inputs.host || 'all 16' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run:** [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**AiGovOps Foundation** — Governance as Code" >> "$GITHUB_STEP_SUMMARY"

  # ── ShellCheck lint the validation script itself ───────────────────────────
  shellcheck-e2e-script:
    name: ShellCheck — e2e-validate.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint e2e-validate.sh
        run: |
          shellcheck -S warning scripts/e2e-validate.sh
          echo "## ShellCheck" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`scripts/e2e-validate.sh\` | ✅ Clean |" >> "$GITHUB_STEP_SUMMARY"
