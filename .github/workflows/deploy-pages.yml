name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          # Copy standalone wizard as the index page
          cp public/aigovops-wizard.html _site/index.html
          # Copy conference handout
          cp public/aigovops-framework.html _site/aigovops-framework.html
          # Copy PDFs
          cp public/openclaw-showcase.pdf _site/openclaw-showcase.pdf 2>/dev/null || true
          cp public/aigovops-compliance-report-v1.pdf _site/aigovops-compliance-report-v1.pdf 2>/dev/null || true
          # Copy any versioned wizard artifacts
          cp -f aigovops-wizard-v*.html _site/ 2>/dev/null || true
          # Include README as reference
          cp README.md _site/ 2>/dev/null || true
          echo "=== Pages artifact contents ==="
          ls -lh _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
