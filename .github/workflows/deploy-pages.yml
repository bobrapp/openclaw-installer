name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Build full app
        run: |
          npm ci
          npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/app

          # Disable Jekyll processing (allows files starting with _)
          touch _site/.nojekyll

          # ── Root: conference handout as hub landing page ──
          cp public/aigovops-framework.html _site/index.html
          cp public/aigovops-framework.html _site/aigovops-framework.html

          # ── Standalone wizard (15-language locale switcher) ──
          cp public/aigovops-wizard.html _site/aigovops-wizard.html

          # ── Compliance dashboard ──
          cp public/dashboard.html _site/dashboard.html

          # ── PDFs ──
          cp public/openclaw-showcase.pdf _site/openclaw-showcase.pdf 2>/dev/null || true
          cp public/aigovops-compliance-report-v1.pdf _site/aigovops-compliance-report-v1.pdf 2>/dev/null || true

          # ── Full React app under /app/ ──
          cp dist/public/index.html _site/app/index.html
          cp -r dist/public/assets _site/app/assets

          # ── Shell scripts (preflight/install/rollback generators) ──
          cp -r scripts _site/scripts 2>/dev/null || true

          # ── 404 fallback for SPA hash routing ──
          cp _site/app/index.html _site/app/404.html

          # ── README ──
          cp README.md _site/ 2>/dev/null || true

          echo "=== Pages artifact contents ==="
          find _site -type f | sort | head -50
          echo "..."
          echo "Total files: $(find _site -type f | wc -l)"
          du -sh _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
