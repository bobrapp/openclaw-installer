name: Release with PDF & SBOM

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: |
          TAG="${GITHUB_REF_NAME}"
          npx @cyclonedx/cyclonedx-npm --output-file "openclaw-sbom-${TAG}.json" --output-format JSON
          npx @cyclonedx/cyclonedx-npm --output-file "openclaw-sbom-${TAG}.xml" --output-format XML

          # Summary
          echo "=== SBOM Generated ==="
          COMP_COUNT=$(python3 -c "import json; d=json.load(open('openclaw-sbom-${TAG}.json')); print(len(d.get('components',[])))")
          echo "Components: ${COMP_COUNT}"
          ls -lh openclaw-sbom-${TAG}.*

      - name: Compute SBOM diff against previous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          SBOM_DIFF_FLAG=""

          # Find the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || true)

          if [ -n "$PREV_TAG" ]; then
            echo "[INFO] Previous tag: ${PREV_TAG}"

            # Try to download the previous SBOM from its release assets
            if gh release download "${PREV_TAG}" \
                 --pattern "openclaw-sbom-${PREV_TAG}.json" \
                 --dir . 2>/dev/null; then
              echo "[INFO] Downloaded previous SBOM: openclaw-sbom-${PREV_TAG}.json"

              python3 scripts/sbom-diff.py \
                --old "openclaw-sbom-${PREV_TAG}.json" \
                --new "openclaw-sbom-${TAG}.json" \
                --old-tag "${PREV_TAG}" \
                --new-tag "${TAG}" \
                --output sbom-diff.json

              SBOM_DIFF_FLAG="--sbom-diff sbom-diff.json"
            else
              echo "[WARN] No SBOM found for ${PREV_TAG} — skipping diff (first release with SBOM)"
            fi
          else
            echo "[INFO] No previous tag found — skipping SBOM diff"
          fi

          # Persist the flag for the PDF step
          echo "SBOM_DIFF_FLAG=${SBOM_DIFF_FLAG}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDF dependencies
        run: |
          pip install reportlab qrcode[pil] pillow

      - name: Generate signed PDF compliance report
        run: |
          TAG="${GITHUB_REF_NAME}"
          python scripts/generate-audit-pdf.py \
            --output "aigovops-audit-report-${TAG}.pdf" \
            ${SBOM_DIFF_FLAG}
          ls -lh "aigovops-audit-report-${TAG}.pdf"

      - name: Generate changelog from commit history
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Find the previous tag (if any)
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1 || true)

          {
            echo "# AiGovOps Foundation Framework — ${TAG}"
            echo ""
            echo "Released: $(date -u +'%B %d, %Y')"
            echo ""
            echo "## What's Included"
            echo ""
            echo "- **Standalone Wizard** — single-file \`aigovops-wizard.html\` (runs offline, no server needed)"
            echo "- **Signed PDF Compliance Report** — immutable audit log with SHA-256 hash chain verification, co-founder attribution, and QR code"
            echo "- **Full source** — Express + React web app with hardening, preflight runner, and framework comparison"
            echo ""
            echo "## Changelog"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              echo ""
              git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (\`%h\`)" --reverse
            else
              echo "### All commits"
              echo ""
              git log --pretty=format:"- %s (\`%h\`)" --reverse
            fi

            echo ""
            echo ""
            echo "## Artifacts"
            echo ""
            echo "| File | Description |"
            echo "|------|-------------|"
            echo "| \`aigovops-audit-report-${TAG}.pdf\` | Signed PDF compliance report with full SHA-256 hash chain |"
            echo "| \`aigovops-wizard-${TAG}.html\` | Standalone offline installer wizard |"
            echo "| \`openclaw-sbom-${TAG}.json\` | CycloneDX SBOM (JSON) — full dependency inventory |"
            echo "| \`openclaw-sbom-${TAG}.xml\` | CycloneDX SBOM (XML) — for automated compliance tooling |"
            if [ -f sbom-diff.json ]; then
              echo "| \`sbom-diff-${TAG}.json\` | SBOM diff — added/removed/changed components vs previous release |"
            fi
            echo ""
            echo "## Co-Founders"
            echo ""
            echo "**Bob Rapp** & **Ken Johnston** — [AiGovOps Foundation](https://www.aigovopsfoundation.org/)"
            echo ""
            echo "---"
            echo ""
            echo "_Live wizard: [bobrapp.github.io/openclaw-installer](https://bobrapp.github.io/openclaw-installer/)_"
          } > release-notes.md

          cat release-notes.md

      - name: Prepare standalone wizard artifact
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp public/aigovops-wizard.html "aigovops-wizard-${TAG}.html"

      - name: Prepare SBOM diff artifact
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -f sbom-diff.json ]; then
            cp sbom-diff.json "sbom-diff-${TAG}.json"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Delete existing release for this tag if present (idempotent re-runs)
          gh release delete "${TAG}" --yes 2>/dev/null || true

          # Build artifact list
          ARTIFACTS=(
            "aigovops-audit-report-${TAG}.pdf#Signed PDF Compliance Report (with SBOM diff)"
            "aigovops-wizard-${TAG}.html#Standalone Installer Wizard (offline)"
            "openclaw-sbom-${TAG}.json#CycloneDX SBOM (JSON)"
            "openclaw-sbom-${TAG}.xml#CycloneDX SBOM (XML)"
          )
          if [ -f "sbom-diff-${TAG}.json" ]; then
            ARTIFACTS+=("sbom-diff-${TAG}.json#SBOM Diff (JSON)")
          fi

          gh release create "${TAG}" \
            --title "AiGovOps Foundation Framework ${TAG}" \
            --notes-file release-notes.md \
            --verify-tag \
            "${ARTIFACTS[@]}"
