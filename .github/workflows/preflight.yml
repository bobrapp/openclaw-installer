name: OpenClaw Preflight Checks

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build project
        run: npm run build

      - name: Run preflight checks
        id: preflight
        run: |
          set -e
          echo "## Preflight Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check 1: Build success (already passed if we got here)
          echo "- ✅ **Build**: Production build successful" >> $GITHUB_STEP_SUMMARY
          
          # Check 2: Schema validation
          echo "### Schema Validation" >> $GITHUB_STEP_SUMMARY
          if grep -q "auditLogs" shared/schema.ts && grep -q "ownerAuth" shared/schema.ts; then
            echo "- ✅ **Audit log schema**: Present with hash chain fields" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Audit log schema**: Missing audit_logs or owner_auth tables" >> $GITHUB_STEP_SUMMARY
            echo "PREFLIGHT_FAIL=true" >> $GITHUB_ENV
          fi

          # Check 3: Security — no hardcoded secrets
          echo "### Security Checks" >> $GITHUB_STEP_SUMMARY
          if grep -rn "password\s*=\s*['\"]" server/ client/ shared/ --include="*.ts" --include="*.tsx" | grep -v "passphrase" | grep -v "PasswordAuthentication" | grep -v "placeholder" | head -5; then
            echo "- ⚠️ **Hardcoded secrets**: Possible hardcoded passwords detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ **Hardcoded secrets**: No hardcoded passwords found" >> $GITHUB_STEP_SUMMARY
          fi

          # Check 4: PII check — no emails/names in logs
          if grep -rn "@.*\.com\|@.*\.org\|@.*\.net" server/storage.ts server/routes.ts 2>/dev/null | grep -v "github.com\|aigovops\|openclaw\|nodesource\|brew.sh\|apple.com" | head -5; then
            echo "- ⚠️ **PII in backend**: Possible PII found in server code" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ **PII check**: No PII detected in server code" >> $GITHUB_STEP_SUMMARY
          fi

          # Check 5: Hash chain implementation
          if grep -q "sha256\|SHA-256\|createHash" server/storage.ts; then
            echo "- ✅ **Hash chain**: SHA-256 crypto implementation present" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Hash chain**: Missing SHA-256 hash chain implementation" >> $GITHUB_STEP_SUMMARY
            echo "PREFLIGHT_FAIL=true" >> $GITHUB_ENV
          fi

          # Check 6: Immutable logging routes
          if grep -q "/api/audit" server/routes.ts; then
            echo "- ✅ **Audit API**: Audit log endpoints present" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Audit API**: Missing audit log API endpoints" >> $GITHUB_STEP_SUMMARY
            echo "PREFLIGHT_FAIL=true" >> $GITHUB_ENV
          fi

          # Check 7: Owner auth protection
          if grep -q "x-owner-passphrase" server/routes.ts; then
            echo "- ✅ **Owner auth**: Audit log protected by owner passphrase" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ **Owner auth**: Audit log may not be owner-protected" >> $GITHUB_STEP_SUMMARY
          fi

          # Check 8: No localhost binding bypass
          if grep -rn "0\.0\.0\.0" server/ --include="*.ts" | grep -v "comment\|NEVER\|Never" | head -5; then
            echo "- ⚠️ **Network binding**: Found 0.0.0.0 binding — should be 127.0.0.1" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ **Network binding**: No public binding detected" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*AiGovOps Foundation Framework — Governance as Code*" >> $GITHUB_STEP_SUMMARY
          echo "*[www.aigovopsfoundation.org](https://www.aigovopsfoundation.org/)*" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        if: env.PREFLIGHT_FAIL == 'true'
        run: |
          echo "::error::Preflight checks failed. See job summary for details."
          exit 1

      - name: Post commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            const description = state === 'success' 
              ? 'All preflight checks passed — AiGovOps compliant' 
              : 'Preflight checks failed — review required';
            
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: state,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: description,
              context: 'AiGovOps Preflight'
            });
