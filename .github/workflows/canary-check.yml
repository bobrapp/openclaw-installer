name: Canary Check

on:
  push:
    branches:
      - master
  schedule:
    # Runs daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canary-verify:
    name: Verify canary manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Make canary-check.sh executable
        run: chmod +x scripts/canary-check.sh

      - name: Run canary verification
        id: canary
        run: |
          set +e
          OUTPUT=$(bash scripts/canary-check.sh --verify 2>&1)
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          # Write output to a file for use in later steps
          printf '%s\n' "${OUTPUT}" > /tmp/canary-output.txt
          # Also print to the Actions log
          printf '%s\n' "${OUTPUT}"
          exit "${EXIT_CODE}"

      - name: Extract tampered files list
        if: failure() && steps.canary.outputs.exit_code == '1'
        id: tampered
        run: |
          TAMPERED=$(grep -E '^\[TAMPERED\]|^\[MISSING\]' /tmp/canary-output.txt \
            | sed 's/^\[TAMPERED\][[:space:]]*//' \
            | sed 's/^\[MISSING\][[:space:]]*//' \
            || echo "(could not extract file list)")
          # Escape newlines for GitHub output
          TAMPERED="${TAMPERED//$'\n'/'%0A'}"
          echo "files=${TAMPERED}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub issue on tampering detected
        if: failure() && steps.canary.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try {
              output = fs.readFileSync('/tmp/canary-output.txt', 'utf8');
            } catch (e) {
              output = '(unable to read verify output)';
            }

            const tamperedFiles = '${{ steps.tampered.outputs.files }}'
              .split('%0A')
              .filter(Boolean)
              .map(f => `- \`${f.trim()}\``)
              .join('\n');

            const body = [
              '## :rotating_light: Canary Token Alert — Tampering Detected',
              '',
              '**Triggered by:** `' + context.eventName + '`  ',
              '**Workflow run:** ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              '**Ref:** `' + context.ref + '`  ',
              '**Commit:** `' + context.sha + '`',
              '',
              '### Tampered / Missing Files',
              tamperedFiles || '_(see full output below)_',
              '',
              '### Full Verify Output',
              '```',
              output.replace(/\x1B\[[0-9;]*m/g, '').trim(),
              '```',
              '',
              '### Recommended Actions',
              '1. Review the listed files against the last known-good commit.',
              '2. Check the GitHub audit log for unauthorized changes.',
              '3. Follow the [Canary Token Alerts](../blob/master/docs/INCIDENT-RESPONSE.md#canary-token-alerts) runbook.',
              '4. After confirming changes are legitimate, run `scripts/canary-check.sh --update` locally and commit the updated manifest.',
              '',
              '---',
              '_Automated alert from the OpenClaw Canary Token System — AiGovOps Foundation_',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[SECURITY] Canary alert: critical file tampering detected — ' + new Date().toISOString().slice(0,10),
              body: body,
              labels: ['SECURITY'],
            });
