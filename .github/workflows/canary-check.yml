# =============================================================================
# Canary Audit Logger - Lightweight immutable build provenance
# =============================================================================
# Replaces per-commit hash verification with cheap append-only logging.
# Hash verification is batched via canary-verify.yml (manual/weekly).
#
# AIGovOps Foundation Design:
#   1. Every action logged (who, what, when, artifact, GUID)
#   2. Crypto hash verification batched at milestones, not per-commit
#   3. GUIDs provide provenance chain for batch verification
#   4. Append-only JSONL stored as workflow artifact (no commit loop)
# =============================================================================
name: Canary Audit Log

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-log:
    name: Append audit entry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate and log audit entry
        id: audit
        run: |
          GUID=$(uuidgen)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ACTOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"
          COMMIT="${{ github.sha }}"
          REF="${{ github.ref }}"
          RUN_ID="${{ github.run_id }}"
          MESSAGE=$(git log -1 --pretty=%s 2>/dev/null || echo "unknown")
          ENTRY=$(jq -cn \
            --arg guid "$GUID" \
            --arg ts "$TIMESTAMP" \
            --arg actor "$ACTOR" \
            --arg event "$EVENT" \
            --arg commit "$COMMIT" \
            --arg ref "$REF" \
            --arg run_id "$RUN_ID" \
            --arg message "$MESSAGE" \
            '{guid: $guid, timestamp: $ts, actor: $actor, event: $event, commit: $commit, ref: $ref, run_id: $run_id, message: $message}')
          echo "$ENTRY" > /tmp/audit-entry.jsonl
          echo "## Audit Entry" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$ENTRY" | jq . >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "guid=$GUID" >> "$GITHUB_OUTPUT"

      - name: Upload audit entry as artifact
        uses: actions/upload-artifact@v4
        with:
          name: audit-entry-${{ steps.audit.outputs.guid }}
          path: /tmp/audit-entry.jsonl
          retention-days: 365
