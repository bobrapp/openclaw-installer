version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    groups:
      npm-minor-and-patch:
        # Stable (>= 1.0.0) packages only. Pre-1.0 (zerover) packages are
        # intentionally excluded: under zerover semantics a "minor" bump can
        # be a breaking change, so they are left ungrouped and receive
        # individual, review-gated PRs — the same scrutiny as major updates.
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "drizzle-orm"
          - "drizzle-zod"
          - "drizzle-kit"
          - "esbuild"
          - "@esbuild/*"
          - "lucide-react"
      npm-major:
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      github-actions-all:
        patterns:
          - "*"
